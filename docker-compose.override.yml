version: '3.9'

# Local development overrides — NOT for production
# This file is auto-loaded by docker compose alongside docker-compose.yml

services:
  php:
    build:
      target: runtime
    volumes:
      - ./:/app
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - NODE_ENV=development
    ports:
      - "9003:9003"

  nginx:
    ports:
      - "8081:80"
      - "8443:443"

  redis:
    ports:
      - "6380:6379"
    command: redis-server --appendonly no

  mailhog:
    image: mailhog/mailhog:latest
    container_name: lumina-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - lumina-net

