version: '3.9'

services:
  # Nginx reverse proxy + SSL termination
  nginx:
    image: nginx:alpine
    container_name: lumina-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./public:/app/public:ro
      - ./logs/nginx:/var/log/nginx
    environment:
      - TZ=UTC
    depends_on:
      php:
        condition: service_healthy
    networks:
      - lumina-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # PHP application
  php:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: lumina-app
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./:/app:ro
      - ./logs/php:/var/log/php
    environment:
      - NODE_ENV=production
      - APP_ENV=production
      - TZ=UTC
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
    networks:
      - lumina-net

  # Redis cache (optional, for sessions)
  redis:
    image: redis:7-alpine
    container_name: lumina-cache
    restart: unless-stopped
    command: redis-server --appendonly no --requirepass ${REDIS_PASSWORD:-change_me}
    volumes:
      - redis-data:/data
    networks:
      - lumina-net

volumes:
  redis-data:
    driver: local

networks:
  lumina-net:
    driver: bridge
